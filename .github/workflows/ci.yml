name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  node-compatibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      # AI modified: keep pnpm version sourced only from packageManager.
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # AI modified: verify the published package against the declared minimum Node runtime.
      - run: pnpm --filter gaudio run typecheck
      - run: pnpm --filter gaudio run test
      - run: pnpm --filter gaudio run build
      - run: pnpm --filter gaudio run pack:dry-run

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      # AI modified: keep pnpm version sourced only from packageManager.
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run test
      - run: pnpm run build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm run e2e

name: Release package

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  node-compatibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      # AI modified: keep pnpm version sourced only from packageManager.
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # AI modified: verify the package still works on the declared minimum Node runtime before publishing.
      - run: pnpm --filter gaudio run typecheck
      - run: pnpm --filter gaudio run test
      - run: pnpm --filter gaudio run build
      - run: pnpm --filter gaudio run pack:dry-run

  publish:
    runs-on: ubuntu-latest
    environment: npm
    needs: node-compatibility
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      # AI modified: keep pnpm version sourced only from packageManager.
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run test
      - run: pnpm run build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm run e2e
      # AI modified: inspect the exact npm package contents before publishing.
      - run: pnpm --filter gaudio run pack:dry-run
      - run: pnpm --filter gaudio publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
